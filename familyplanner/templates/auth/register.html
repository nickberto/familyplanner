{% extends "base.html" %}

{% block title %}Registrieren - Familienplaner{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Registrieren</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Benutzername:</label>
                <input type="text" id="username" name="username" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn-primary">Registrieren</button>
        </form>
        <p class="auth-link">
            Bereits ein Konto? <a href="{{ url_for('auth.login') }}">Hier anmelden</a>
        </p>
    </div>
</div>
{% endblock %}
