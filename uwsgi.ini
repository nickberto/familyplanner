[uwsgi]
# Socket communication
socket = 127.0.0.1:5001
protocol = http

# Python path and application
chdir = /home/nt/src/familyplanner
home = /home/nt/.virtualenvs/familyplanner
wsgi-file = wsgi.py
callable = app

# Process configuration
master = true
processes = 4
threads = 2

# Logging
logto = /home/nt/logs/uwsgi.log

# Reloading on changes
python-autoreload = 1

# Timeout
http-timeout = 60
socket-timeout = 60

# Environment
env = ENV=production
