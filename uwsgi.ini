[uwsgi]
# Socket communication
socket = 0.0.0.0:5001
protocol = http

# Python path and application
chdir = /home/user/src/familyplanner
home = /home/user/.virtualenvs/familyplanner
wsgi-file = wsgi.py
callable = app

# Process configuration
master = true
processes = 1
threads = 1

# Logging
logto = /home/user/logs/uwsgi.log

# Reloading on changes
python-autoreload = 1

# Timeout
http-timeout = 60
socket-timeout = 60

# Environment
env = production
